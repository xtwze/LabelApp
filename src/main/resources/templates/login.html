<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Label App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 {
            margin-bottom: 10px;
            color: #222;
            font-size: 28px;
        }
        h4 {
            margin-bottom: 30px;
            color: #555;
            font-weight: normal;
        }
        hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 30px 0;
        }
        form {
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
        .links {
            margin-top: 25px;
        }
        .links a {
            color: #007bff;
            text-decoration: none;
            font-size: 16px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .back-link {
            margin-top: 40px;
            display: inline-block;
            padding: 12px 24px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }
        .back-link:hover {
            background: #545b62;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Label App</h1>
    <h4>Авторизация</h4>
    <hr>

    <form action="/login" method="post">
        <label>Эл. почта</label>
        <input type="email" name="username" required autofocus>

        <label>Пароль</label>
        <input type="password" name="password" required>

        <input type="hidden" name="_csrf" value="${_csrf.token}">

        <button type="submit" class="btn">Войти</button>
    </form>

    <div class="links">
        <a href="/registration">Зарегистрироваться</a>
    </div>

    <a href="/" class="back-link">← Назад в каталог</a>

</div>

</body>
</html>
