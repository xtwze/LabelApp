<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование ролей — Label App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px auto;
            max-width: 800px;
            background: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        h1 {
            margin-bottom: 10px;
            color: #222;
            font-size: 28px;
            text-align: center;
        }
        h3 {
            margin-bottom: 30px;
            color: #444;
            text-align: center;
            font-weight: normal;
        }
        hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 30px 0;
        }
        form {
            text-align: left;
        }
        .roles-list {
            margin-bottom: 30px;
        }
        .role-item {
            margin: 15px 0;
            font-size: 18px;
        }
        .role-item label {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .role-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            accent-color: #007bff;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
        .back-link {
            margin-top: 40px;
            display: block;
            text-align: center;
            padding: 12px 24px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }
        .back-link:hover {
            background: #545b62;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Label App</h1>
    <h3>Редактирование ролей пользователя <strong>${user.name!"Без имени"}</strong></h3>
    <hr>

    <form action="/admin/user/edit" method="post">

        <div class="roles-list">
            <#list roles as role>
            <div class="role-item">
                <label>
                    <input type="checkbox"
                           name="roles"
                           value="${role}"
                    <#if user.roles?seq_contains(role)>checked</#if>>
                ${role}
                </label>
            </div>
        </#list>
</div>

<input type="hidden" name="userId" value="${user.id}">
<input type="hidden" name="_csrf" value="${_csrf.token}">

<button type="submit" class="btn">Сохранить изменения</button>
</form>

<a href="/admin" class="back-link">← Назад в админку</a>

</div>

</body>
</html>
